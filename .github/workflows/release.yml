name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: beddel-desk-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: beddel-desk-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: beddel-desk-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Resolve sqlite3.h for sqlite-vec CGO (Windows)
        if: runner.os == 'Windows'
        shell: bash
        # sqlite-vec's CGO #include "sqlite3.h" fails on Windows because the
        # header lives inside mattn/go-sqlite3's module cache. We resolve the
        # path and export CGO_CFLAGS so the Build step picks it up.
        run: |
          go mod download github.com/mattn/go-sqlite3
          MODDIR=$(go list -m -f '{{.Dir}}' github.com/mattn/go-sqlite3)
          MODDIR=$(echo "$MODDIR" | sed 's|\\|/|g')
          echo "CGO_CFLAGS=-I${MODDIR}" >> "$GITHUB_ENV"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        # Release binaries include the semantic search stack: FTS5 (via the
        # sqlite_fts5 build tag on mattn/go-sqlite3) and sqlite-vec (linked
        # via the asg017/sqlite-vec-go-bindings/cgo adapter). The ONNX
        # runtime and all-MiniLM-L6-v2 model are NOT embedded; they are
        # downloaded on first use. See docs/architecture/02-semantic-search.md.
        run: go build -trimpath -tags sqlite_fts5 -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/beddel-desk

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  deb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/download-artifact@v4
        with:
          name: beddel-desk-linux-amd64
          path: .

      - name: Build .deb
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          chmod +x beddel-desk-linux-amd64
          VERSION="${GITHUB_REF_NAME#v}"
          sed "s/__VERSION__/${VERSION}/" nfpm.yaml > nfpm-resolved.yaml
          nfpm package -f nfpm-resolved.yaml -p deb -t "beddel-desk_${VERSION}_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: beddel-desk-deb
          path: "*.deb"

  release:
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
