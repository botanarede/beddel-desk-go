name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: beddel-desk-linux-amd64
            deps: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
          - os: macos-13
            goos: darwin
            goarch: amd64
            binary: beddel-desk-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: beddel-desk-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: beddel-desk-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: ${{ matrix.deps }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/beddel-desk

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
