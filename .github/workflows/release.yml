name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: beddel-desk-linux-amd64
            deps: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: beddel-desk-linux-arm64
            deps: |
              sudo dpkg --add-architecture arm64
              sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list
              echo 'deb [arch=arm64] http://ports.ubuntu.com/ noble main restricted universe multiverse' | sudo tee /etc/apt/sources.list.d/arm64.list
              echo 'deb [arch=arm64] http://ports.ubuntu.com/ noble-updates main restricted universe multiverse' | sudo tee -a /etc/apt/sources.list.d/arm64.list
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu libgl1-mesa-dev:arm64 libx11-dev:arm64 libxrandr-dev:arm64 libxxf86vm-dev:arm64 libxi-dev:arm64 libxcursor-dev:arm64 libxinerama-dev:arm64
            cc: aarch64-linux-gnu-gcc
            pkgconfig: /usr/lib/aarch64-linux-gnu/pkgconfig
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary: beddel-desk-darwin-amd64
            deps: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: beddel-desk-darwin-arm64
            deps: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: beddel-desk-windows-amd64.exe
            deps: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc || '' }}
          PKG_CONFIG_PATH: ${{ matrix.pkgconfig || '' }}
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/beddel-desk

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
